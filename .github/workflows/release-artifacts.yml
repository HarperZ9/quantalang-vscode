name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate manifests
        run: |
          python -m json.tool package.json > /dev/null
          python -m json.tool language-configuration.json > /dev/null
          python -m json.tool syntaxes/buildlang.tmLanguage.json > /dev/null
      - name: Build package artifacts
        run: |
          npx --yes @vscode/vsce@3.9.2 package --no-dependencies
          npm pack
      - uses: actions/upload-artifact@v5
        with:
          name: buildlang-vscode-release-artifacts
          path: |
            buildlang-*.tgz
            buildlang-*.vsix
