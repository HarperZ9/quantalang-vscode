name: CI

on:
  push:
    branches: [main, feat/rename-buildlang-vscode]
  pull_request:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate manifests
        run: |
          python -m json.tool package.json > /dev/null
          python -m json.tool language-configuration.json > /dev/null
          python -m json.tool syntaxes/buildlang.tmLanguage.json > /dev/null
      - name: Dry-run package
        run: npm pack --dry-run
